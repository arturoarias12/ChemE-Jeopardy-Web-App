<!doctype html>
<!--
File: player.html
Description: Player-facing browser console for joining teams, syncing clocks, buzzing, and submitting wagers.
Author: Arturo Arias
Last updated: 2026-05-04
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChemE Jeopardy Player</title>
    <link rel="stylesheet" href="/assets/app.css">
</head>
<body class="player-page">
    <header class="hero">
        <div>
            <p class="eyebrow">ChemE Jeopardy</p>
            <h1>Player Console</h1>
            <p class="hero-copy">Join a team, synchronize your device clock, and buzz in with a server-adjusted timestamp so the host can resolve races fairly.</p>
        </div>
        <div class="hero-chip" id="player-identity-chip">Not joined yet</div>
    </header>

    <main class="page-shell">
        <section class="panel spotlight-panel">
            <div class="panel-head">
                <h2>Game Spotlight</h2>
                <div class="button-row">
                    <button class="button ghost-button" id="resync-button" type="button">Resync Clock</button>
                    <button class="button ghost-button" id="clear-session-button" type="button">Clear Session</button>
                </div>
            </div>
            <div class="status-grid" id="player-status-grid"></div>
            <div id="player-alert" class="alert-banner"></div>
            <div id="active-clue-panel"></div>
            <div id="player-final-panel"></div>
            <div id="player-controls-panel"></div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Join A Team</h2>
            </div>
            <form id="join-form" class="stack-form">
                <label class="input-group">
                    <span>Display name</span>
                    <input type="text" id="display-name" name="displayName" maxlength="40" placeholder="Alex">
                </label>
                <label class="input-group">
                    <span>Team</span>
                    <select id="team-select" name="teamId"></select>
                </label>
                <label class="input-group">
                    <span>Player password</span>
                    <input type="password" id="join-password" name="joinPassword" autocomplete="current-password" placeholder="Ask the moderator">
                </label>
                <div id="player-join-note" class="minor-note"></div>
                <button class="button primary-button" id="join-submit-button" type="submit">Join Team</button>
            </form>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Scoreboard</h2>
            </div>
            <div class="team-grid" id="player-scoreboard"></div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Current Board</h2>
            </div>
            <div id="player-board"></div>
        </section>
    </main>

    <div id="toast" class="toast"></div>
    <noscript>This app needs JavaScript enabled.</noscript>
    <script src="/assets/player.js" defer></script>
</body>
</html>
