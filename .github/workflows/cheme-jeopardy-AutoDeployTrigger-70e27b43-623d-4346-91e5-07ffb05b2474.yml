name: Trigger auto deployment for cheme-jeopardy

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cheme-jeopardy-AutoDeployTrigger-70e27b43-623d-4346-91e5-07ffb05b2474.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CHEMEJEOPARDY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CHEMEJEOPARDY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CHEMEJEOPARDY_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: caf51efdbf33acr
          containerAppName: cheme-jeopardy
          resourceGroup: rg-cheme-jeopardy
          imageToBuild: caf51efdbf33acr.azurecr.io/cheme-jeopardy:${{ github.sha }}
          targetPort: 8080
          ingress: external


